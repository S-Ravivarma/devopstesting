<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>

    <style>
        body{
            font-family: Arial;
            background-color: #f2f2f2;
        }

        .login-box{
            width:300px;
            margin:100px auto;
            background:white;
            padding:20px;
            border-radius:10px;
            text-align:center;
        }

        input{
            width:90%;
            padding:10px;
            margin:10px;
        }

        button{
            padding:10px 20px;
            background:blue;
            color:white;
            border:none;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h2>Login</h2>

    <input type="text" placeholder="Username">

    <input type="password" placeholder="Password">

    <button>Login</button>
</div>

</body>
</html>
